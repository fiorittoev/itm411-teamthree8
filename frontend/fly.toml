# fly.toml app configuration file generated for three8-frontend on 2026-03-16T09:33:01-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'three8-frontend'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 19000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
